name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip && pip install pyinstaller

      - name: Build app
        shell: cmd
        run: |
          pyinstaller --noconfirm --onedir --contents-directory . --name SalesDashboard ^
            --add-data "index.html;." ^
            --add-data "app.js;." ^
            --add-data "styles.css;." ^
            server.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SalesDashboard-Windows
          path: dist/SalesDashboard
